<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <div class="container">

    <h1>Task Manager</h1>

    <div class="task-form">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter task..."
      >

      <button onclick="addTask()">
        Add Task
      </button>
    </div>

    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
